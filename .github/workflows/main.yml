name: Robot Framework Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          pip install robotframework==6.1.1
          pip install robotframework-seleniumlibrary
          pip install allure-robotframework==2.13.5

      - name: Set up Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run tests
        run: |
          python -m robot --variable BROWSER:headlesschrome \
                --outputdir results \
                --listener allure_robotframework \
                Tests/
        continue-on-error: true

      - name: Debug - Check allure results
        if: always()
        run: |
          echo "=== allure-results ==="
          ls -la allure-results/ || echo "NOT FOUND"

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results --clean -o results/allure-report
        continue-on-error: true

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: results/allure-report
